avigates to My Appointments and clicks View All\r\n  And User clicks on Rebook for a doctor\r\n  And User clicks Continue\r\n  And User click ChangeBtn to Change the patient and click proceed\r\n  Then User should see Book Appointment option\r\n\r\n\r\n# Scenario 4: BMI Calculator (Excel Driven)\r\n@bmi @dataDriven\r\nScenario: Verify BMI result for Female user using Excel data\r\n  When User navigates to Health Tools page\r\n  And User clicks CALCULATE for Body Mass Index\r\n  And User selects gender as Female\r\n  And User navigates to height input\r\n  And User enters BMI data from excel\r\n  Then BMI result should be displayed\r\n\r\n  \r\n# Scenario 5: Docter description validation \r\n@description @regression\r\nScenario Outline: Validate doctor description for multiple doctors\r\n  When User selects location and specialization\r\n  And User sorts by Most Liked\r\n  And User opens doctor description \"<doctorName>\"\r\n  Then Doctor description should be validated \"<expectedDescription>\"\r\n\r\nExamples:\r\n  | doctorName         | expectedDescription                                                                     |\r\n  | Dr. Ajay K Sinha    | Dr. Ajay K Sinha has over 30 years of experience and is fluent in English, Hindi, Punjabi.|\r\n  | Dr. Tripti Agrawal | Dr. Tripti Agrawal has over 25 years of experience and is fluent in English, Hindi.      |\r\n  \r\n","mediaType":"text\/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:\/\/\/C:\/Users\/Shyam%20Sundar\/git\/Testing-Sprint-Apollo247\/.\/src\/test\/java\/com\/apollo247\/testing\/features\/FindDocterModule.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Apollo 247 End-to-End Functional Testing","description":"","children":[{"background":{"location":{"line":2,"column":1},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":3,"column":1},"keyword":"When ","keywordType":"Action","text":"user clicks the find \r\nAnd user clicks BUY NOW\r\nAnd user scrolls to 12 months plan and clicks Join Now\r\nThen the following plan details should be visible on the page\r\n| planDetail |\r\n| 12 Months  |\r\n| 199        |\r\n\r\n@Notifications @NavigationCheck\r\nScenario: Verify Notification Preferences page loads successfully\r\nWhen user navigates to Manage Family Members\r\nAnd user clicks on Notification Preferences\r\nThen Notification Preferences page should be displayed\r\n\r\n@Notifications @PushNotification\r\nScenario: Enable Push Notifications toggle successfully\r\nWhen user navigates to Manage Family Members\r\nAnd user clicks on Notification Preferences\r\nAnd user enables Push Notifications\r\nThen Push Notifications toggle should be active\r\n\r\n@Notifications @SmsNotification\r\nScenario: Enable SMS Notifications toggle successfully\r\nWhen user navigates to Manage Family Members\r\nAnd user clicks on Notification Preferences\r\nAnd user enables SMS Notifications\r\nThen SMS Notifications toggle should be active\r\n\r\n@Notifications @AllNotifications\r\nScenario: Enable all notification types from the preferences page\r\nWhen user navigates to Manage Family Members\r\nAnd user clicks on Notification Preferences\r\nAnd user enables the following notification types\r\n| notificationType   |\r\n| Push Notifications |\r\n| SMS Notifications  |\r\nThen all selected notifications should be enabled\r\n\r\n@NeedHelp @Navigation\r\nScenario: Verify Need Help page categories are displayed\r\nWhen user navigates to Need Help\r\nThen all help categories should be visible\r\n\r\n@NeedHelp @Medicines\r\nScenario: Verify user can navigate to Medicines help section\r\nWhen user navigates to Need Help\r\nAnd user clicks on Medicines category\r\nThen Medicines help page should be loaded\r\n\r\n@Logout @Navigation\r\nScenario: Verify user can successfully logout from the application\r\nGiven user is logged into the application\r\nWhen user clicks on profile icon\r\nAnd user clicks
