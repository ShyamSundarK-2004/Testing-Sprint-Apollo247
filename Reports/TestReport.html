I Calculator (Excel Driven)\r\n@bmi @dataDriven\r\nScenario: Verify BMI result for Female user using Excel data\r\n  When User navigates to Health Tools page\r\n  And User clicks CALCULATE for Body Mass Index\r\n  And User selects gender as Female\r\n  And User navigates to height input\r\n  And User enters BMI data from excel\r\n  Then BMI result should be displayed\r\n\r\n  \r\n# Scenario 5: Docter description validation \r\n@description @regression\r\nScenario Outline: Validate doctor description for multiple doctors\r\n  When User selects location and specialization\r\n  And User sorts by Most Liked\r\n  And User opens doctor description \"<doctorName>\"\r\n  Then Doctor description should be validated \"<expectedDescription>\"\r\n\r\nExamples:\r\n  | doctorName         | expectedDescription                                                                     |\r\n  | Dr. Ajay K Sinha    | Dr. Ajay K Sinha has over 30 years of experience and is fluent in English, Hindi, Punjabi.|\r\n  | Dr. Tripti Agrawal | Dr. Tripti Agrawal has over 25 years of experience and is fluent in English, Hindi.      |\r\n  \r\n","mediaType":"text\/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:\/\/\/C:\/Users\/Shyam%20Sundar\/git\/Testing-Sprint-Apollo247\/.\/src\/test\/java\/com\/apollo247\/testing\/features\/FindDocterModule.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Apollo 247 End-to-End Functional Testing","description":"","children":[{"background":{"location":{"line":2,"column":1},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":3,"column":1},"keyword":"When ","keywordType":"Action","text":"user clicks the find_Docter module","id":"017f74fa-19fb-4189-aba8-07db8b8c3bef"}],"id":"92fd187a-82fc-4989-a52d-2dc149dc89b6"}},{"scenario":{"location":{"line":6,"column":1},"tags":[{"location":{"line":5,"column":1},"name":"@doctorBooking","id":"8e8597ef-c3ab-461b-a8fc-ade2c77c0644"},{"lo
