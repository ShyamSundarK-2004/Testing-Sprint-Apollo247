n@doctorBooking @smoke\r\nScenario: Book a hospital visit appointment\r\nWhen user searches for speciality\r\n| speciality |\r\n| Andrology  | \r\nAnd user selects first available doctor\r\nAnd user clicks on schedule appointment\r\nAnd user enters phone number\r\n| phone      |\r\n| 9876543210 |\r\nThen validate phone number and amount displayed\r\n\r\n\r\n# Scenario 2: Filter Doctor and Book\r\n@filter @regression\r\nScenario: Filter the doctor and book appointment\r\n  When User click the general Physician\r\n  And user applies sorting as \"Price - low to high\"\r\n  And user filters doctors by experience \"6-10\"\r\n  And user filters doctors by language \"English\"\r\n  And user clicks on first displayed docter\r\n  And user clicks the view profile and write review \"handled in calm way\"\r\n  Then verify the feedback\r\n\r\n\r\n# Scenario 3: Rebook Appointment\r\n@rebook @regression\r\nScenario: Verify Book Appointment option after rebooking\r\n  When User navigates to My Appointments and clicks View All\r\n  And User clicks on Rebook for a doctor\r\n  And User clicks Continue\r\n  And User click ChangeBtn to Change the patient and click proceed\r\n  Then User should see Book Appointment option\r\n\r\n\r\n# Scenario 4: BMI Calculator (Excel Driven)\r\n@bmi @dataDriven\r\nScenario: Verify BMI result for Female user using Excel data\r\n  When User navigates to Health Tools page\r\n  And User clicks CALCULATE for Body Mass Index\r\n  And User selects gender as Female\r\n  And User navigates to height input\r\n  And User enters BMI data from excel\r\n  And User clicks CALCULATE button\r\n  Then BMI category should match expected value from excel\r\n\r\n  \r\n# Scenario 5: Docter description validation \r\n@description @regression\r\nScenario Outline: Validate doctor description for multiple doctors\r\n  When User selects location and specialization\r\n  And User sorts by Most Liked\r\n  And User opens doctor description \"<doctorName>\"\r\n  Then Doctor description should be validated \"<expectedDescription>\"\r\n\r\nExamples:\r\n  | doctorName         | expectedDescription                                                                     |\r\n  | Dr. S K Agarwal    | Dr. S K Agarwal has over 43 years of experience and is fluent in English, Hindi.        |\r\n  | Dr. Pawan Sharma   | Dr. Pawan Sharma has over 8 years of experience and is fluent in English, Hindi.        |\r\n  \r\n# Scenario 6: Find Doctor Negative Scenarios\r\n@Negative\r\nScenario: Validate error when location is not selected\r\n  When User selects speciality \"Andrology\"\r\n  And User selects date \"24\"\r\n  And User clicks on submit without location\r\n  Then Pincode validation message should be displayed\r\n@Negative1\r\nScenario: Validate no doctors found for invalid speciality\r\nWhen user searches for the  speciality\r\n| speciality |\r\n| Ayurveda Dermatology |\r\nThen no doctors found message should be displayed\r\n","mediaType":"text\/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:\/\/\/C:\/Users\/Shyam%20Sundar\/OneDrive\/Desktop\/Capgemini%20Project\/com.apollo247.Testing_Sprint\/src\/test\/java\/com\/apollo247\/testing\/features\/FindDoctorModule.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Apollo 247 End-to-End Functional Testing","description":"","children":[{"background":{"location":{"line":2,"column":1},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":3,"column":1},"keyword":"When ","keywordType":"Action","text":"user clicks the find_Docter module","id":"8a20b439-2c1d-4db2-a81b-f90f77ea6612"}],"id":"1719127d-0a4b-425a-98c2-0da14e0c2148"}},{"scenario":{"location":{"line":7,"column":1},"tags":[{"location":{"line":6,"column":1},"name":"@doctorBooking","id":"3fc21a37-365f-4744-8e84-0f000328be47"},{"location":{"line":6,"column":16},"name":"@smoke","id":"137d0199-1ba3-4b6a-9b6d-86e551b1747a"}],"keyword":"Scenario","name":"Book a hospital v d Self)\r\n     When User selects \"<Gender>\" and \"<member>\" at the age \"<age>\" as members\r\n     And User clicks on \"View Plans\"\r\n     Then Insurance plans should be loaded successfully\r\n\t Examples:\r\n     | Gender | member  | age |\r\n     | Male   | Self    | 22  |\r\n     | Female | Husband | 43  |\r\n     | Female | Mother  | 55  |\r\n\t\r\n\t ##############################################--------Scenario 2------------############################################################  \r\n\t @negative @insurance @validation\r\n\t Scenario: Verify validation when no member is selected\r\n\t When User clicks on \"View Plans\" without selecting any member\r\n\t Then Proper validation error message \"Select minimum one adult\" should be displayed\r\n\t \r\n\t ##############################################--------Scenario 3------------############################################################  \r\n\t @regression @insurance @memberSelection\r\n     Scenario: Verify multiple member selection (Self, Husband, Father)\r\n     When User selects members with following details\r\n     | Gender | Member   | Age |\r\n     | Female | Self     | 28  |\r\n     | Female | Husband  | 25  |\r\n     | Female | Father   | 55  |\r\n     And User clicks on \"View Plans\"\r\n     Then Family insurance plans should be displayed correctly\r\n\t \r\n\t ##############################################--------Scenario 4------------############################################################   \r\n\t @filtering @sorting \r\n\t Scenario: Verify member selection, plans listing, filter and sorting\r\n     When User selects \"Male\" and \"Self\" at the age \"22\" as members\r\n     And User clicks on \"View Plans\"\r\n     And User applies coverage filter between \"₹10-24 Lakh\"\r\n     And User selects room rent type as \"Single private room\"\r\n     And User sorts plans by \"Premium - Low to high\"\r\n     Then Plans should be displayed based on applied filters coverage amount \"₹10-24 Lakh\" and \"Premium\"\r\n     \r\n     ##############################################--------Scenario 5------------############################################################   \r\n     @policyPurchase @validDetails\r\n     Scenario: Purchase Insurance Plan with valid details\r\n\t When User selects \"Male\" and \"Self\" at the age \"22\" as members\r\n     When User clicks on \"View Plans\"\r\n     And User clicks proceeds with plan customization\r\n     And  User completes step1 Member Details form \r\n     And User completes  step2 Medical Questions form \r\n     And User completes step3 Proposer Details form \r\n     And  User completes step4 KYC Verification  upload document\r\n     And  User completes step5 address proof  upload document\r\n     And  User completes step6 Address Details \r\n     And User completes step7 Nomiee Selection \r\n     And User completes step8 Bank Account Details \r\n     And User completes all the forms and clicks \r\n     And User accepts Terms and Conditions\r\n     Then User reviews policy details \r\n     When User clicks on policy form \r\n     Then The Payment Options page should be displayed with text and validating the policy\r\n    \r\n    \r\n    \r\n    \r\n    ","mediaType":"text\/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:\/\/\/C:\/Users\/Shyam%20Sundar\/OneDrive\/Desktop\/Capgemini%20Project\/com.apollo247.Testing_Sprint\/src\/test\/java\/com\/apollo247\/testing\/features\/HealthInsurance_Feature.feature","feature":{"location":{"line":1,"column":6},"tags":[],"language":"en","keyword":"Feature","name":"Apollo 247 Health Insurance - Member Selection Validation","description":"","children":[{"background":{"location":{"line":3,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":6,"column":3},"keyword":"Given ","keywordType":"Context","text":"User navigates to Health Insurance page and enter pincode \"601201\"","id":"64586311-8499-47c2-ae3b-84f20008c29e"}],"id":"97 Given User is on Lab Tests page\n    Then check user in on correct module\n\n  @labTest @searchScenario @smoke @regression\n  Scenario Outline: Verify search functionality for lab tests\n    When User searches for \"<input>\"\n    Then validate search result for \"<input>\",\"<type>\"\n\n    Examples:\n      | input     | type    |\n      | H1N1 Test | valid   |\n      | @@@@      | invalid |\n      | 12333     | invalid |\n\n  @labTest @prescriptionScenario @smoke @sanity\n  Scenario: Verify booking lab test using correct prescription format\n    When User clicks on book test using prescription\n    And User uploads valid prescription\n    Then verify proceed button is enabled\n\n  @labTest @prescriptionScenario @regression\n  Scenario: Verify booking lab test using wrong prescription file format\n    When User clicks on book test using prescription\n    And User uploads invalid prescription\n    Then verify wrong file uploaded popup shown\n\n  @labTest @radiologyScenario @system @regression\n  Scenario: Verify user can initiate radiology request successfully\n    When User clicks on lab test search bar\n    And User clicks on explore radiology option and switch to radiology tab\n    Then User should be on radiology page\n    When User enters radiology details\n      | city    | hospital                  | date     | tests         | filePath                                        |\n      | Chennai | Anna Nagar- Apollo Clinic | April-25 | X-Ray,CT Scan | \/src\/test\/resources\/TestData\/prescription2.jpeg |\n    Then User should see request call button is enabled\n\n  @labTest @myOrder @regression\n  Scenario Outline: Verify orders are filtered correctly for each patient in dropdown\n    Given User should be on orders page\n    When User clicks on patient dropdown\n    Then User select a name \"<names>\" and check orders\n\n    Examples:\n      | names    |\n      | Shyam    |\n      | Matharam |\n\n  @labTest @EndToEndScenario @smoke @system @regression\n  Scenar nel\r\n    Then user is logged into the application\r\n\r\n  @ManageFamily\r\n  Scenario: Add valid family member from Excel\r\n    When user navigates to Manage Family Members\r\n    And user adds family members from excel\r\n    Then family member should be created successfully \"Profile created successfully.\"\r\n\r\n  @Negative\r\n  Scenario: Add family member with empty details\r\n    When user navigates to Manage Family Members\r\n    And user clicks Add New Profile\r\n    Then validation error message should be displayed\r\n\r\n  @MyAppointments @AppointmentDisplay\r\n  Scenario: Verify My Appointments page loads successfully\r\n    When user clicks My Appointments\r\n    Then Appointments section should be displayed\r\n\r\n  @MyAppointments @PageReload\r\n  Scenario: Verify My Appointments page persists after refresh\r\n    When user clicks My Appointments\r\n    And user refreshes the page\r\n    Then Appointments section should still be displayed\r\n\r\n  @MyMemberships @CorporateEmail\r\n  Scenario Outline: Verify error for invalid corporate email\r\n    When user navigates to My Memberships\r\n    And user clicks Activate Corporate Membership\r\n    And user enters corporate email \"<Email>\"\r\n    And user clicks Get OTP\r\n    Then corporate benefits error message should be displayed\r\n    And user dismisses the error popup\r\n\r\n    Examples:\r\n      | Email             |\r\n      | abc@capgemini.com |\r\n      | test@benz.com     |\r\n\r\n  @MyMemberships @PlanValidation\r\n  Scenario: Verify membership plan details after clicking Buy Now\r\n    When user navigates to My Memberships\r\n    And user clicks BUY NOW\r\n    And user scrolls to 12 months plan and clicks Join Now\r\n    Then the following plan details should be visible on the page\r\n      | planDetail     |\r\n      | 12 months plan |\r\n      | Rs. 199        |\r\n\r\n  @Notifications @NavigationCheck\r\n  Scenario: Verify Notification Preferences page loads successfully\r\n    When user navigates to Manage Family Members\r\n    And user clicks on Notification Preferences\r\n    Then Notification Preferences page should be displayed\r\n\r\n  @Notifications @PushNotification\r\n  Scenario: Enable Push Notifications toggle successfully\r\n    When user navigates to Manage Family Members\r\n    And user clicks on Notification Preferences\r\n    And user enables Push Notifications\r\n    Then Push Notifications toggle should be active\r\n\r\n  @Notifications @SmsNotification\r\n  Scenario: Enable SMS Notifications toggle successfully\r\n    When user navigates to Manage Family Members\r\n    And user clicks on Notification Preferences\r\n    And user enables SMS Notifications\r\n    Then SMS Notifications toggle should be active\r\n\r\n  @Notifications @AllNotifications\r\n  Scenario: Enable all notification types from the preferences page\r\n    When user navigates to Manage Family Members\r\n    And user clicks on Notification Preferences\r\n    And user enables the following notification types\r\n      | notificationType   |\r\n      | Push Notifications |\r\n      | SMS Notifications  |\r\n    Then all selected notifications should be enabled\r\n\r\n  @NeedHelp @Navigation\r\n  Scenario: Verify Need Help page categories are displayed\r\n    When user navigates to Need Help\r\n    Then all help categories should be visible\r\n\r\n  @NeedHelp @Medicines\r\n  Scenario: Verify user can navigate to Medicines help section\r\n    When user navigates to Need Help\r\n    And user clicks on Medicines category\r\n    Then Medicines help page should be loaded\r\n\r\n  @Logout @Navigation\r\n  Scenario: Verify user can successfully logout from the application\r\n    Given user is logged into the application\r\n    When user clicks on profile icon\r\n    And user clicks on logout option\r\n    Then user should be redirected to login page\r\n","mediaType":"text\/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:\/\/\/C:\/Users\/Shyam%20Sundar\/OneDr
